name: tourism_app
description: A modern tourism application with Clean Architecture + Firebase Auth
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ─────────────────────────────────
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # ── State Management ─────────────────────────
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # ── Dependency Injection ─────────────────────
  get_it: ^9.2.1
  injectable: ^2.3.2

  # ── Navigation ───────────────────────────────
  go_router: ^17.1.0

  # ── Network ──────────────────────────────────
  dio: ^5.3.3
  http: ^1.1.0

  # ── Local Storage ────────────────────────────
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # ── Offline / Connectivity ────────────────────
  connectivity_plus: ^7.0.0

  # ── QR / Barcode ──────────────────────────────
  qr_flutter: ^4.1.0

  # ── UI ───────────────────────────────────────
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.7
  pinput: ^6.0.2
  image_picker: ^1.0.4

  # ── Fonts ────────────────────────────────────
  google_fonts: ^8.0.2

  # ── Utils ────────────────────────────────────
  intl: ^0.20.2
  dartz: ^0.10.1
  rxdart: ^0.28.0
  uuid: ^4.2.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  dotted_border: ^3.1.0
  percent_indicator: ^4.2.3

  # ── Maps ──────────────────────────────────────
  google_maps_flutter: ^2.5.3
  flutter_polyline_points: ^3.1.0

  # ── Payment (Stripe) ─────────────────────────
  flutter_stripe: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
